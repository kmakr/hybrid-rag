<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HKJC Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3352;
      --accent: #4f7df3;
      --accent-hover: #6b93ff;
      --text: #e8eaf6;
      --muted: #8892b0;
      --user-bubble: #1e3a5f;
      --bot-bubble: #1a1d27;
      --success: #4caf7d;
      --danger: #e05a5a;
      --radius: 12px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    header h1 span { color: var(--accent); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tag {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 20px;
      flex-shrink: 0;
    }

    aside h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .setting-group { display: flex; flex-direction: column; gap: 10px; }

    label.setting {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text);
    }

    label.setting span { color: var(--muted); font-size: 0.75rem; }

    input[type="range"] {
      width: 80px;
      accent-color: var(--accent);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      top: 2px;
      left: 2px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #fff; }

    .divider { height: 1px; background: var(--border); }

    /* ── Upload ── */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(79, 125, 243, 0.05);
      color: var(--text);
    }

    .upload-zone input { display: none; }

    .upload-zone .upload-icon { font-size: 1.4rem; margin-bottom: 6px; }

    #ingest-btn {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    #ingest-btn:hover { background: var(--accent-hover); }
    #ingest-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #ingest-status {
      font-size: 0.75rem;
      text-align: center;
      min-height: 18px;
      color: var(--muted);
    }

    #ingest-status.success { color: var(--success); }
    #ingest-status.error { color: var(--danger); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message { display: flex; gap: 10px; max-width: 820px; }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.bot { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--accent); color: #fff; }
    .message.bot .avatar { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.9rem;
      max-width: 100%;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble p { margin-bottom: 0.5em; }
    .bubble p:last-child { margin-bottom: 0; }

    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sources-label {
      width: 100%;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }

    .source-chip {
      font-size: 0.72rem;
      padding: 3px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
    }

    /* ── Typing indicator ── */
    .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .empty-state .icon { font-size: 2.5rem; }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    #question {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 12px 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
      max-height: 140px;
    }

    #question:focus { border-color: var(--accent); }
    #question::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px;
      height: 44px;
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>HKJC <span>Chatbot</span></h1>
  <div class="header-controls">
    <span class="tag" id="model-tag">minimax/minimax-m2.7</span>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div>
      <h2>Settings</h2>
    </div>
    <div class="setting-group">
      <label class="setting">
        Top-K chunks
        <span id="k-val">5</span>
      </label>
      <input type="range" id="k-slider" min="1" max="20" value="5"
             oninput="document.getElementById('k-val').textContent = this.value" />

      <label class="setting">
        Rerank results
        <label class="toggle">
          <input type="checkbox" id="rerank-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </label>
    </div>

    <div class="divider"></div>

    <div>
      <h2 style="margin-bottom:10px">Ingest Documents</h2>
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" multiple accept=".pdf,.doc,.docx,.txt,.md" />
        <div class="upload-icon">📄</div>
        <div>Drop files here or click to browse</div>
        <div style="margin-top:4px;font-size:0.7rem">PDF, DOCX, TXT, MD</div>
      </div>
      <div id="file-list" style="font-size:0.75rem;color:var(--muted);margin:8px 0;min-height:16px"></div>
      <button id="ingest-btn" disabled onclick="ingestFiles()">Ingest</button>
      <div id="ingest-status"></div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <div>Ask a question about your documents</div>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="question" rows="1" placeholder="Ask a question…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">&#9658;</button>
    </div>
  </div>

</div>

<script>
  // ── File upload ────────────────────────────────────────────────────────────
  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  const fileList = document.getElementById('file-list');
  const ingestBtn = document.getElementById('ingest-btn');
  const ingestStatus = document.getElementById('ingest-status');

  fileInput.addEventListener('change', updateFileList);

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    fileInput.files = e.dataTransfer.files;
    updateFileList();
  });

  function updateFileList() {
    const files = Array.from(fileInput.files);
    fileList.textContent = files.length ? files.map(f => f.name).join(', ') : '';
    ingestBtn.disabled = files.length === 0;
    ingestStatus.textContent = '';
    ingestStatus.className = '';
  }

  async function ingestFiles() {
    const files = Array.from(fileInput.files);
    if (!files.length) return;

    ingestBtn.disabled = true;
    ingestStatus.textContent = 'Ingesting…';
    ingestStatus.className = '';

    const form = new FormData();
    files.forEach(f => form.append('files', f));

    try {
      const res = await fetch('/ingest', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Ingestion failed');
      ingestStatus.textContent = `✓ Ingested ${data.ingested.length} file(s)`;
      ingestStatus.className = 'success';
      fileInput.value = '';
      fileList.textContent = '';
    } catch (err) {
      ingestStatus.textContent = '✗ ' + err.message;
      ingestStatus.className = 'error';
    } finally {
      ingestBtn.disabled = false;
    }
  }

  // ── Chat ───────────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const sendBtn = document.getElementById('send-btn');
  const questionEl = document.getElementById('question');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function appendMessage(role, content, sources) {
    emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (content === null) {
      // typing indicator
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      bubble.innerHTML = content.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('');
      if (sources && sources.length) {
        const src = document.createElement('div');
        src.className = 'sources';
        src.innerHTML = `<div class="sources-label">Sources</div>` +
          sources.map(s => `<span class="source-chip">${escHtml(s.document)} #${s.chunk_index}</span>`).join('');
        bubble.appendChild(src);
      }
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const question = questionEl.value.trim();
    if (!question) return;

    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', question);
    const typingBubble = appendMessage('bot', null);

    const k = parseInt(document.getElementById('k-slider').value);
    const rerank = document.getElementById('rerank-toggle').checked;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, k, rerank }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Request failed');

      typingBubble.innerHTML = data.answer.split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('');
      if (data.sources && data.sources.length) {
        const src = document.createElement('div');
        src.className = 'sources';
        src.innerHTML = `<div class="sources-label">Sources</div>` +
          data.sources.map(s => `<span class="source-chip">${escHtml(s.document)} #${s.chunk_index}</span>`).join('');
        typingBubble.appendChild(src);
      }
    } catch (err) {
      typingBubble.innerHTML = `<span style="color:var(--danger)">Error: ${escHtml(err.message)}</span>`;
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }
</script>
</body>
</html>
